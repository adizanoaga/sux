<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SUX</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #ff4fb8;
        font-family: Arial, Helvetica, sans-serif;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: clamp(0.75rem, 2vw, 1.5rem);
        padding: 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(4rem, 18vw, 12rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
      }

      .byline {
        font-size: clamp(0.9rem, 2vw, 1.35rem);
        font-weight: 700;
        color: #ff9bd3;
        white-space: nowrap;
      }

      @media (max-width: 520px) {
        .brand {
          flex-direction: column;
          align-items: center;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="brand" aria-label="SUX by CAP Holdings">
      <h1>SUX</h1>
      <p class="byline">by CAP Holdings</p>
    </main>
  </body>
</html>
