<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Router live 1 - SUX Records</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #fff3fa;
        --muted: #d9a8c4;
        --pink: #ff4fb8;
        --soft-pink: #ff9bd3;
        --line: rgba(255, 79, 184, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: 4rem clamp(1.25rem, 6vw, 5rem);
      }

      .section-inner {
        width: min(760px, 100%);
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0;
        color: var(--pink);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 0.75rem;
        color: var(--text);
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .qr-card {
        max-width: 420px;
        margin-top: 2.5rem;
        padding: 1.35rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #090006;
      }

      .qr-card img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        background: #fff;
        border-radius: 8px;
      }

      .qr-card p {
        margin-top: 1rem;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        display: inline-block;
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
      }

      a:hover,
      a:focus-visible {
        color: var(--pink);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="section-inner">
        <p class="eyebrow">Live tools</p>
        <h1>Router live 1</h1>
        <div class="qr-card">
          <img id="qr" alt="Cod QR pentru Router live 1">
          <p id="details"></p>
        </div>
        <a href="live-tools.html?unlocked=1">Înapoi la routere</a>
      </div>
    </main>
    <script>
      if (sessionStorage.getItem("suxLiveToolsAccess") !== "true") {
        window.location.href = "live-tools.html";
      }

      const router = {
        name: "Router live 1",
        ssid: "SUX Live 1",
        password: "666666",
        security: "WPA"
      };

      const wifiPayload = `WIFI:T:${router.security};S:${router.ssid};P:${router.password};;`;
      document.querySelector("#qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=640x640&data=${encodeURIComponent(wifiPayload)}`;
      document.querySelector("#details").textContent = `${router.name} - ${router.ssid}`;
    </script>
  </body>
</html>
